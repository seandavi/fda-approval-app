# Netlify build configuration.
# Connect this repo at app.netlify.com → "Add new site" → "Import an existing
# project" → GitHub → fda-approval-app. The settings below are picked up
# automatically; you can leave the UI defaults blank.

[build]
  command   = "npm run build"
  publish   = "dist"
  # Netlify auto-detects netlify/functions/, but pinning makes intent
  # explicit and survives directory layout changes.
  functions = "netlify/functions"

# Gemini 3.1 Pro preview on Keytruda-class labels takes 12-20s end-to-end.
# Netlify's default sync-function timeout is 10s, which surfaced as the
# generic "HTTP 502: An unknown error has occurred" on PR #42 when the
# function was killed mid-call. Bumping to the standard-tier max (26s)
# gives the slowest legitimate Pro responses room to complete; if a call
# really does hang past 26s, the timeout fires and the client renders
# the existing "LLM arbiter unavailable" tile (#32) — same UX as before,
# just with fewer false positives.
[functions."llm-lookup"]
  timeout = 26

[build.environment]
  NODE_VERSION = "20"
  # Surface the git SHA to the client bundle so the footer and CSV exports
  # can show which version produced a result. COMMIT_REF is set by Netlify
  # for every deploy.
  VITE_GIT_SHA = "$COMMIT_REF"

# Route /api/* to Netlify Functions before the SPA catch-all below.
# The llm-lookup function declares its own path internally, but listing the
# redirect makes the API surface visible at a glance.
[[redirects]]
  from   = "/api/llm-lookup"
  to     = "/.netlify/functions/llm-lookup"
  status = 200

# SPA-style routing: nothing else handles /lookup or /about, but if you add
# client-side routes later this rewrite keeps deep links working.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Long-cache the hashed assets Vite emits; never cache index.html so users
# always get the latest entrypoint pointing at the freshest hashed bundles.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
